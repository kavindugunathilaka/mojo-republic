<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careers | The Mojo Republic</title>
  <meta name="description" content="Open roles at The Mojo Republic. Join a team that outthinks, outmakes, and outlasts the noise." />
  <meta name="theme-color" content="#d9a641" />
  <link rel="canonical" href="https://www.themojorepublic.com.my/careers.html" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="careers">
  <a class="skip-link" href="#main">Skip to main content</a>

  <div data-component="navbar"></div>

  <main id="main">
    <header class="page-header text-center">
      <div class="container" data-reveal>
        <p class="section-eyebrow">Careers</p>
        <h1 class="page-header__title mx-auto">Join us</h1>
        <p class="page-header__lede mx-auto">We're always looking for sharp, curious minds who care about the craft as much as we do.</p>
      </div>
    </header>

    <section class="section">
      <div class="container">
        <div class="grid grid-3" data-render="jobs-list" data-reveal-stagger></div>
      </div>
    </section>

    <section class="section section--dark text-center">
      <div class="container" data-reveal>
        <h2 style="color:var(--color-text-inverse);font-size:var(--fs-2xl);margin-bottom:var(--space-5);">Don't see the right role?</h2>
        <p style="color:var(--color-text-inverse-muted);max-width:56ch;margin-inline:auto;margin-bottom:var(--space-6);">
          We're always happy to hear from good people. Send your portfolio or CV our way.
        </p>
        <a class="btn btn--accent" href="contact.html">Get in touch</a>
      </div>
    </section>
  </main>

  <div data-component="footer"></div>

  <script src="js/config.js"></script>
  <script src="js/content-data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>

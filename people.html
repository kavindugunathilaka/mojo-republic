<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our People | The Mojo Republic</title>
  <meta name="description" content="Meet the leadership behind The Mojo Republic — award-winning PR practitioners bringing over 26 years of integrated communications craft." />
  <meta name="theme-color" content="#c99a3e" />
  <link rel="canonical" href="https://www.themojorepublic.com.my/people.html" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="people">
  <a class="skip-link" href="#main">Skip to main content</a>

  <div data-component="navbar"></div>

  <main id="main">
    <section class="section--dark" style="padding-top:var(--space-9);">
      <div class="container">
        <div class="section-head" data-reveal>
          <p class="section-eyebrow">Our People</p>
          <h1 style="color:var(--color-text-inverse);font-size:clamp(2rem, 4vw, var(--fs-3xl));">At the helm</h1>
        </div>
        <div class="grid grid-2" style="align-items:center;gap:var(--space-9);padding-bottom:var(--space-9);">
          <div class="hero__media" data-reveal="scale">
            <img data-render="team-photo" src="assets/images/team-portrait.svg" alt="Andora Fredericks, Managing Director of The Mojo Republic" width="800" height="1000" />
          </div>
          <div data-render="team-quote" data-reveal></div>
        </div>
      </div>
    </section>

    <section class="section" style="background:var(--color-bg-dark-alt);color:var(--color-text-inverse);">
      <div class="container grid grid-2" style="gap:var(--space-8);" data-render="team-bio-extended"></div>
    </section>

    <section class="section section--alt text-center">
      <div class="container" data-reveal>
        <p class="section-eyebrow">Join the republic</p>
        <h2 style="margin-bottom:var(--space-5);">We're always looking for sharp, curious minds.</h2>
        <a class="btn btn--primary" href="careers.html">See open roles</a>
      </div>
    </section>
  </main>

  <div data-component="footer"></div>

  <script src="js/config.js"></script>
  <script src="js/content-data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
